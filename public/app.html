<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <base href="/genealogy-viz/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genealogy Network</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="graph-container"></div>

  <div id="toolbar">
    <button class="toolbar-btn active" id="btn-role" data-i18n="toolbar_role" onclick="setColorMode('role')">By Role</button>
    <button class="toolbar-btn" id="btn-surname" data-i18n="toolbar_surname" onclick="setColorMode('surname')">By Surname</button>
    <button class="toolbar-btn" id="btn-sex" data-i18n="toolbar_sex" onclick="setColorMode('sex')">By Sex</button>
    <button class="toolbar-btn" id="btn-overlap" data-i18n="toolbar_overlap" onclick="setColorMode('overlap')" data-i18n-title="toolbar_overlap_title">Overlap</button>
    <button class="toolbar-btn" id="btn-lang" data-i18n="lang_toggle_label" onclick="i18n.toggleLang()">EN</button>
  </div>

  <div id="admin-badge">● Admin mode — <a href="admin" style="color:inherit">Open CRM</a></div>

  <div id="side-panel">
    <div class="panel-header">
      <div>
        <h2 id="panel-name">—</h2>
        <div id="panel-role-header" style="margin-top:4px"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
    <div id="panel-edit-actions" style="padding:12px 16px;display:none;gap:8px">
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
    </div>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/colour-modes.js"></script>
  <script src="js/overlap-logic.js"></script>
  <script src="js/rel-path.js"></script>
  <script src="js/side-panel.js"></script>
  <script src="js/viz.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async function() {
      await i18n.init();
      await initViz();
    });
  </script>
</body>
</html>
