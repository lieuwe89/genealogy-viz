<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genealogy Network</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="graph-container"></div>

  <div id="toolbar">
    <button class="toolbar-btn active" id="btn-role" onclick="setColorMode('role')">By Role</button>
    <button class="toolbar-btn" id="btn-surname" onclick="setColorMode('surname')">By Surname</button>
    <button class="toolbar-btn" id="btn-sex" onclick="setColorMode('sex')">By Sex</button>
  </div>

  <div id="admin-badge">● Admin mode — <a href="/admin" style="color:inherit">Open CRM</a></div>

  <div id="side-panel">
    <div class="panel-header">
      <div>
        <h2 id="panel-name">—</h2>
        <div id="panel-role-header" style="margin-top:4px"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
    <div id="panel-edit-actions" style="padding:12px 16px;display:none;gap:8px">
      <button class="btn btn-primary" onclick="saveEdit()">Save</button>
      <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
    </div>
  </div>

  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <script src="/js/colour-modes.js"></script>
  <script src="/js/side-panel.js"></script>
  <script src="/js/viz.js"></script>
</body>
</html>
